fixed_waypoint_patrol_node:
  ros__parameters:
    waypoint_file: "waypoints/waver_bird_patrol_demo.yaml"
    odom_topic: "/odom"
    cmd_topic: "/waver/cmd_vel_patrol"
    state_topic: "/waver/patrol_state"
    current_waypoint_topic: "/waver/current_waypoint"
    frame_id: "odom"
    mode_default: "AUTO"
    loop_count: -1
    max_linear_speed: 0.12
    max_angular_speed: 0.40
    xy_tolerance_m: 0.25
    yaw_tolerance_rad: 0.35
    odom_timeout_sec: 0.8

lidar_aerial_motion_detector_node:
  ros__parameters:
    lidar_objects_topic: "/waver/lidar_objects"
    detections_topic: "/lidar/detections"
    object_point_topic: "/waver/object_point"
    enable_pointcloud_input: false
    pointcloud_topic: "/points"
    target_topic: "/waver/aerial_target"
    active_topic: "/waver/aerial_target_active"
    state_topic: "/waver/aerial_motion_state"
    lateral_axis: "y"
    depth_axis: "x"
    height_axis: "z"
    positive_lateral_is_left: true
    min_height_m: 0.35
    max_height_m: 8.0
    min_depth_m: 0.2
    max_depth_m: 20.0
    min_motion_m: 0.08
    motion_min_mps: 0.10
    bearing_motion_min_deg_per_sec: 3.0
    track_match_gate_m: 1.0
    motion_confirm_count: 2
    target_hold_sec: 1.0
    lost_timeout_sec: 1.5
    lock_switch_cooldown_sec: 1.0
    prefer_existing_lock: true
    reject_negative_depth: true

pointcloud_lidar_objects_node:
  ros__parameters:
    pointcloud_topic: "/mid360_PointCloud2"
    output_pose_array_topic: "/waver/lidar_objects"
    state_topic: "/waver/lidar_objects_state"
    min_height_m: 0.35
    max_height_m: 8.0
    min_depth_m: 0.2
    max_depth_m: 20.0
    voxel_leaf_size_m: 0.20
    cluster_eps_m: 0.55
    cluster_min_points: 4
    max_points: 12000
    remove_robot_body: true
    self_x_min: -0.6
    self_x_max: 0.6
    self_y_min: -0.6
    self_y_max: 0.6
    self_z_min: -0.3
    self_z_max: 0.8

livox_pointcloud_to_scan_node:
  ros__parameters:
    pointcloud_topic: "/mid360"
    scan_topic: "/scan"
    state_topic: "/waver/livox_scan_adapter_state"
    forward_axis: "x"
    lateral_axis: "y"
    height_axis: "z"
    positive_lateral_is_left: true
    obstacle_min_height_m: -0.35
    obstacle_max_height_m: 0.80
    range_min_m: 0.08
    range_max_m: 12.0
    angle_increment_rad: 0.01745329252
    min_raw_points: 50
    min_used_points: 10

gazebo_bird_pose_bridge_node:
  ros__parameters:
    bird_pose_topic: "/bird/nearest_pose"
    bird_visible_topic: "/bird/visible"
    odom_topic: "/odom"
    object_point_topic: "/waver/object_point"
    base_frame_id: "base_link"
    odom_timeout_sec: 0.8
    bird_timeout_sec: 0.8

target_body_tracker_node:
  ros__parameters:
    target_topic: "/waver/aerial_target"
    active_topic: "/waver/aerial_target_active"
    cmd_topic: "/waver/cmd_vel_target_track"
    state_topic: "/waver/target_tracking_state"
    direction_topic: "/waver/target_direction"
    centered_topic: "/waver/target_centered"
    base_frame: "base_link"
    use_tf_transform: true
    lateral_axis: "y"
    depth_axis: "x"
    positive_lateral_is_left: true
    forward_when_aligned: false
    center_tolerance_rad: 0.08
    min_target_depth_m: 0.15
    max_angular_speed: 0.38
    max_angular_delta_per_tick: 0.035
    angular_kp: 1.1

battery_return_manager_node:
  ros__parameters:
    warning_percentage: 0.30
    critical_percentage: 0.20
    resume_percentage: 0.38
    warning_voltage: 9.8
    critical_voltage: 9.3
    resume_voltage: 10.2
    battery_stale_sec: 5.0
    stop_on_battery_stale: false
    prefer_charge_pose: true
