services:
  fsd-dev:
    build:
      context: ./docker
      dockerfile: Dockerfile
    image: ${IMAGE_NAME}:humble-pc
    container_name: ${CONTAINER_NAME}
    env_file:
      - .env
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=0
      - SERIAL_PORT=${SERIAL_PORT_PC}
      - UGV_WS_PATH=/ros2_ws/ugv_ws
    volumes:
      # GUI 지원 (RViz, Gazebo)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # 전체 워크스페이스 마운트 (소스 수정 즉시 반영)
      - .:/ros2_ws/ugv_ws
      # Gazebo 모델 캐시 유지
      - ${HOME}/.gazebo:/root/.gazebo
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    working_dir: /ros2_ws/ugv_ws
