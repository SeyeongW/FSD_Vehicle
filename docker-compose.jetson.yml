services:
  fsd-jetson:
    build:
      context: ./docker
      dockerfile: Dockerfile.jetson
    image: ${IMAGE_NAME}:humble-jetson
    container_name: ${CONTAINER_NAME}_jetson
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all,compute,video
      - SERIAL_PORT=${SERIAL_PORT_JETSON}
    volumes:
      # 전체 워크스페이스 마운트
      - .:/ros2_ws/ugv_ws
      # 실제 센서 접근 (Livox 라이다, 카메라 등)
      - /dev:/dev
      # udev 규칙 지원 (장치 핫플러그 감지)
      - /run/udev:/run/udev:ro
    devices:
      - ${SERIAL_PORT_JETSON}:${SERIAL_PORT_JETSON}
      - ${VIDEO_DEVICE}:${VIDEO_DEVICE}
      - /dev/snd:/dev/snd
    runtime: nvidia
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    working_dir: /ros2_ws/ugv_ws
